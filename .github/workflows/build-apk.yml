name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

     - name: Install Capacitor locally
        run: npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor/share

      - name: Build web app
        run: npm run build

      - name: Init Capacitor Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Generate app icons
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/values
          convert client/public/1769045968337.png -trim +repage -resize 48x48 -background black -gravity center -extent 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert client/public/1769045968337.png -trim +repage -resize 72x72 -background black -gravity center -extent 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert client/public/1769045968337.png -trim +repage -resize 96x96 -background black -gravity center -extent 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert client/public/1769045968337.png -trim +repage -resize 144x144 -background black -gravity center -extent 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert client/public/1769045968337.png -trim +repage -resize 192x192 -background black -gravity center -extent 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert client/public/1769045968337.png -trim +repage -resize 48x48 -background black -gravity center -extent 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert client/public/1769045968337.png -trim +repage -resize 72x72 -background black -gravity center -extent 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert client/public/1769045968337.png -trim +repage -resize 96x96 -background black -gravity center -extent 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert client/public/1769045968337.png -trim +repage -resize 144x144 -background black -gravity center -extent 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert client/public/1769045968337.png -trim +repage -resize 192x192 -background black -gravity center -extent 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          convert client/public/1769045968337.png -trim +repage -resize 192x192 -background black -gravity center -extent 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="ic_launcher_background">#000000</color></resources>' > android/app/src/main/res/values/ic_launcher_background.xml
          echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/ic_launcher_background"/><foreground android:drawable="@mipmap/ic_launcher_foreground"/></adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/ic_launcher_background"/><foreground android:drawable="@mipmap/ic_launcher_foreground"/></adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"|android:roundIcon="@mipmap/ic_launcher"|g' android/app/src/main/AndroidManifest.xml
          
      - name: Fix Kotlin duplicate classes
        run: |
          echo "" >> android/build.gradle
          echo "subprojects {" >> android/build.gradle
          echo "    configurations.all {" >> android/build.gradle
          echo "        resolutionStrategy {" >> android/build.gradle
          echo "            force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'" >> android/build.gradle
          echo "            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'" >> android/build.gradle
          echo "            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'" >> android/build.gradle
          echo "        }" >> android/build.gradle
          echo "    }" >> android/build.gradle
          echo "}" >> android/build.gradle

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vibyng-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
